<!DOCTYPE html>
<html lang="pl" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title th:text="'Edytuj: ' + ${post.title} + ' - Student Blog'">Edytuj post</title>
    <link rel="stylesheet" th:href="@{/css/app.css}" />
</head>
<body>
<header class="navbar">
    <div class="container">
        <a class="brand" th:href="@{/}">Student Blog</a>
        <nav class="menu">
            <a th:href="@{/}">Home</a>
            <a th:href="@{/posts}">Posty</a>
            <a th:href="@{/posts/new}">Dodaj post</a>
        </nav>
    </div>
</header>

<main class="container">
    <a class="btn btn-outline" th:href="@{/posts/{id}(id=${post.id})}">← Wróć</a>

    <h1 class="page-title">Edytuj post</h1>

    <section class="card">
        <div class="meta" th:if="${post.updatedAt != null}">
            Ostatnia aktualizacja:
            <span th:text="${#temporals.format(post.updatedAt, 'HH:mm dd.MM.yyyy')}">18:11 14.03.2026</span>
        </div>

        <form class="form" th:action="@{/posts/{id}(id=${post.id})}" th:object="${postForm}" method="post">
            <div class="form-group">
                <label>Tytuł</label>
                <input class="input" type="text" th:field="*{title}" />
                <div class="field-error" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></div>
            </div>

            <div class="form-group">
                <label>Obrazek (URL)</label>
                <input class="input" type="text" th:field="*{imageUrl}" placeholder="https://..." />
            </div>

            <div class="form-group" th:if="${postForm.imageUrl != null and !#strings.isEmpty(postForm.imageUrl)}">
                <img class="img img-cover-md" th:src="${postForm.imageUrl}" alt="Podgląd obrazka" />
            </div>

            <div class="form-group">
                <label>Treść</label>
                <textarea class="textarea" th:field="*{content}" rows="10"></textarea>
                <div class="field-error" th:if="${#fields.hasErrors('content')}" th:errors="*{content}"></div>
            </div>

            <button class="btn btn-primary" type="submit">Zapisz zmiany</button>
        </form>
    </section>
</main>
</body>
</html>
