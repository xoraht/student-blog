<!DOCTYPE html>
<html lang="pl" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title th:text="'Edytuj: ' + ${post.title} + ' - Student Blog'">Edytuj post</title>
    <link rel="stylesheet" th:href="@{/css/app.css}" />
</head>
<body>
<header class="navbar">
    <div class="container">
        <a class="brand" th:href="@{/}">Student Blog</a>
        <nav class="menu">
            <a th:href="@{/}">Home</a>
            <a th:href="@{/posts}">Posty</a>
            <a th:href="@{/posts/new}">Dodaj post</a>
        </nav>
    </div>
</header>

<main class="container">
    <a class="btn btn-outline" th:href="@{/posts/{id}(id=${post.id})}">← Wróć</a>

    <h1 style="margin-top:12px;">Edytuj post</h1>

    <section class="card">
        <form th:action="@{/posts/{id}(id=${post.id})}" th:object="${postForm}" method="post">

            <div style="margin-bottom:12px;">
                <label>Tytuł</label><br/>
                <input type="text" th:field="*{title}" style="width:100%; padding:8px;" />
                <div th:if="${#fields.hasErrors('title')}" th:errors="*{title}" style="color:#b91c1c;"></div>
            </div>

            <div style="margin-bottom:12px;">
                <label>Obrazek (URL)</label><br/>
                <input type="text" th:field="*{imageUrl}" placeholder="https://..." style="width:100%; padding:8px;" />
            </div>

            <!-- Podgląd obrazka (opcjonalnie) -->
            <div th:if="${postForm.imageUrl != null and !#strings.isEmpty(postForm.imageUrl)}"
                 style="margin-bottom:12px;">
                <img th:src="${postForm.imageUrl}" alt="Podgląd obrazka"
                     style="width:100%; max-height:320px; object-fit:cover; border-radius:10px;" />
            </div>

            <div style="margin-bottom:12px;">
                <label>Treść</label><br/>
                <textarea th:field="*{content}" rows="10" style="width:100%; padding:8px;"></textarea>
                <div th:if="${#fields.hasErrors('content')}" th:errors="*{content}" style="color:#b91c1c;"></div>
            </div>

            <button type="submit" style="padding:10px 14px;">Zapisz zmiany</button>
        </form>
    </section>
</main>
</body>
</html>
