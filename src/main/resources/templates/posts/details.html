<!DOCTYPE html>
<html lang="pl" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title th:text="${post.title} + ' - Student Blog'">Post</title>
    <link rel="stylesheet" th:href="@{/css/app.css}" />
</head>
<body>
<header class="navbar">
    <div class="container">
        <a class="brand" th:href="@{/}">Student Blog</a>
        <nav class="menu">
            <a th:href="@{/}">Home</a>
            <a th:href="@{/posts}">Posty</a>
            <a th:href="@{/posts/new}">Dodaj post</a>
        </nav>
    </div>
</header>

<main class="container">
    <a class="btn btn-outline" th:href="@{/posts}">← Wróć</a>

    <section class="card" style="margin-top:12px;">
        <h1 th:text="${post.title}" style="margin-top:0;">Tytuł</h1>

        <!-- OBRAZEK (jeśli podany) -->
        <div th:if="${post.imageUrl != null}" style="margin: 10px 0 14px 0;">
            <img th:src="${post.imageUrl}" alt="obrazek"
                 style="width:100%; max-height:360px; object-fit:cover; border-radius:10px;" />
        </div>

        <div class="meta">
            <div th:if="${post.createdAt != null}">
                Utworzono:
                <span th:text="${#strings.substring(post.createdAt, 0, 16)}">2026-03-14T18:11</span>
            </div>
            <div th:if="${post.updatedAt != null}">
                Zaktualizowano:
                <span th:text="${#strings.substring(post.updatedAt, 0, 16)}">2026-03-14T18:11</span>
            </div>
        </div>

        <div class="actions">
            <a class="btn btn-primary" th:href="@{/posts/{id}/edit(id=${post.id})}">Edytuj</a>

            <form th:action="@{/posts/{id}/delete(id=${post.id})}" method="post"
                  onsubmit="return confirm('Na pewno usunąć post?');"
                  style="margin:0;">
                <button class="btn btn-danger" type="submit">Usuń</button>
            </form>
        </div>

        <p style="white-space: pre-wrap; margin-bottom:0;" th:text="${post.content}">Treść</p>
    </section>
</main>
</body>
</html>
