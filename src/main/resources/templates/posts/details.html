<!DOCTYPE html>
<html lang="pl" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title th:text="${post.title} + ' - Student Blog'">Post</title>
    <link rel="stylesheet" th:href="@{/css/app.css}" />
</head>
<body>
<header class="navbar">
    <div class="container">
        <a class="brand" th:href="@{/}">Student Blog</a>
        <nav class="menu">
            <a th:href="@{/}">Home</a>
            <a th:href="@{/posts}">Posty</a>
            <a th:href="@{/posts/new}">Dodaj post</a>
        </nav>
    </div>
</header>

<main class="container">
    <a class="btn btn-outline" th:href="@{/posts}">← Wróć</a>

    <section class="card section-gap">
        <div class="post-header">
            <h2 class="post-title" th:text="${post.title}">Tytuł</h2>
            <div class="post-date" th:if="${post.createdAt != null}">
                <span th:text="${#temporals.format(post.createdAt, 'HH:mm dd.MM.yyyy')}">18:11 14.03.2026</span>
            </div>
        </div>

        <div class="section-gap" th:if="${post.imageUrl != null}">
            <img class="img img-cover-lg" th:src="${post.imageUrl}" alt="obrazek" />
        </div>

        <div class="actions">
            <a class="btn btn-primary" th:href="@{/posts/{id}/edit(id=${post.id})}">Edytuj</a>
            <form th:action="@{/posts/{id}/delete(id=${post.id})}" method="post" onsubmit="return confirm('Na pewno usunąć post?');">
                <button class="btn btn-danger" type="submit">Usuń</button>
            </form>
        </div>

        <p class="post-content" th:text="${post.content}">Treść</p>
    </section>
</main>
</body>
</html>
