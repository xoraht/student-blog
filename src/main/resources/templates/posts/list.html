<!DOCTYPE html>
<html lang="pl" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Posty - Student Blog</title>
    <link rel="stylesheet" th:href="@{/css/app.css}" />
</head>
<body>
<header class="navbar">
    <div class="container">
        <a class="brand" th:href="@{/}">Student Blog</a>
        <nav class="menu">
            <a th:href="@{/}">Home</a>
            <a th:href="@{/posts}">Posty</a>
            <a th:href="@{/posts/new}">Dodaj post</a>
        </nav>
    </div>
</header>

<main class="container">
    <h1 class="page-title">Posty</h1>

    <section class="card" th:if="${#lists.isEmpty(posts)}">
        <p>Brak postów.</p>
        <div class="actions">
            <a class="btn btn-primary" th:href="@{/posts/new}">Dodaj pierwszy post</a>
        </div>
    </section>

    <section class="card" th:each="p : ${posts}">
        <h2 th:text="${p.title}">Tytuł</h2>

        <div class="section-gap" th:if="${p.imageUrl != null}">
            <img class="img img-cover-sm" th:src="${p.imageUrl}" alt="obrazek" />
        </div>

        <p th:text="${#strings.abbreviate(p.content, 180)}">Treść…</p>

        <div class="actions">
            <a class="btn btn-outline" th:href="@{/posts/{id}(id=${p.id})}">Czytaj więcej</a>
        </div>
    </section>
</main>
</body>
</html>
