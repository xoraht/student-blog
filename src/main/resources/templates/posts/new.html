<!DOCTYPE html>
<html lang="pl" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Dodaj post - Student Blog</title>
    <link rel="stylesheet" th:href="@{/css/app.css}" />
</head>
<body>
<header class="navbar">
    <div class="container">
        <a class="brand" th:href="@{/}">Student Blog</a>
        <nav class="menu">
            <a th:href="@{/}">Home</a>
            <a th:href="@{/posts}">Posty</a>
            <a th:href="@{/posts/new}">Dodaj post</a>
        </nav>
    </div>
</header>

<main class="container">
    <h1 class="page-title">Dodaj post</h1>

    <section class="card">
        <form class="form" th:action="@{/posts}" th:object="${postForm}" method="post">
            <div class="form-group">
                <label>Tytuł</label>
                <input class="input" type="text" th:field="*{title}" />
                <div class="field-error" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></div>
            </div>

            <div class="form-group">
                <label>Obrazek (URL)</label>
                <input class="input" type="text" th:field="*{imageUrl}" placeholder="https://..." />
            </div>

            <div class="form-group">
                <label>Treść</label>
                <textarea class="textarea" th:field="*{content}" rows="10"></textarea>
                <div class="field-error" th:if="${#fields.hasErrors('content')}" th:errors="*{content}"></div>
            </div>

            <button class="btn btn-primary" type="submit">Zapisz</button>
        </form>
    </section>
</main>
</body>
</html>
